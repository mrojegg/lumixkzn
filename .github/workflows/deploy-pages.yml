name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact
        run: |
          mkdir -p _site
          cp ./*.html _site/
          cp ./*.ico _site/ 2>/dev/null || true
          if [ -f robots.txt ]; then cp robots.txt _site/robots.txt; fi
          if [ -f sitemap.xml ]; then cp sitemap.xml _site/sitemap.xml; fi
          if ls yandex_*.html >/dev/null 2>&1; then cp yandex_*.html _site/; fi
          if [ -d assets ]; then cp -R assets _site/assets; fi
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

